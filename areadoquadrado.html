<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Área do Quadrado</title>
</head>
<body>

  <h2>Calculadora da Área do Quadrado</h2>

  <label>Digite o valor do lado:</label>
  <input type="number" id="lado" step="0.1"><br><br>

  <button onclick="calcularArea()">Calcular Área</button>

  <h3 id="resultado"></h3>

  <script>
    function calcularArea() {
      let lado = parseFloat(document.getElementById("lado").value);

      let area = lado * lado; // ou Math.pow(lado, 2)

      document.getElementById("resultado").innerText = "Área: " + area;
    }
  </script>

</body>
</html>
