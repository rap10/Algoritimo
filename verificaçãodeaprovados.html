<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Verificador de Aprovação</title>
</head>
<body>

  <h2>Verificador de Aprovados</h2>

  <label>Digite a nota:</label>
  <input type="number" id="nota" step="0.1"><br><br>

  <button onclick="verificar()">Verificar</button>

  <h3 id="resultado"></h3>

  <script>
    function verificar() {
      let nota = parseFloat(document.getElementById("nota").value);

      let resultado = (nota >= 6) ? "Aprovado" : "Reprovado";

      document.getElementById("resultado").innerText = resultado;
    }
  </script>

</body>
</html>
