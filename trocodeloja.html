<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cálculo de Troco</title>
</head>
<body>

  <h2>Sistema de Troco</h2>

  <label>Valor do produto:</label><br>
  <input type="number" id="valor" step="0.01"><br><br>

  <label>Valor do pagamento:</label><br>
  <input type="number" id="pagamento" step="0.01"><br><br>

  <button onclick="calcularTroco()">Calcular Troco</button>

  <h3 id="resultado"></h3>

  <script>
    function calcularTroco() {
      let valor = parseFloat(document.getElementById("valor").value);
      let pagamento = parseFloat(document.getElementById("pagamento").value);

      let troco = pagamento - valor;

      document.getElementById("resultado").innerText =
        "Troco: " + troco.toFixed(2);
    }
  </script>

</body>
</html>
