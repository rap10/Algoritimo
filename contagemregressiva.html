<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contagem Regressiva</title>
</head>
<body>

  <h2>Contagem Regressiva</h2>

  <label>Digite um número:</label><br>
  <input type="number" id="numero"><br><br>

  <button onclick="contagem()">Iniciar</button>

  <h3 id="resultado"></h3>

  <script>
    function contagem() {
      let n = parseInt(document.getElementById("numero").value);
      let texto = "";

      for (let i = n; i >= 0; i--) {
        texto += i;

        if (i !== 0) {
          texto += ", ";
        }
      }

      document.getElementById("resultado").innerText = texto;
    }
  </script>

</body>
</html>
