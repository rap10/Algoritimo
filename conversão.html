<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conversor Celsius para Fahrenheit</title>
</head>
<body>

  <h2>Conversor de Temperatura</h2>

  <label>Temperatura em Celsius (°C):</label>
  <input type="number" id="celsius" step="0.1"><br><br>

  <button onclick="converter()">Converter</button>

  <h3 id="resultado"></h3>

  <script>
    function converter() {
      let c = parseFloat(document.getElementById("celsius").value);

      let f = (c * 9/5) + 32;

      document.getElementById("resultado").innerText = "Fahrenheit: " + f + " °F";
    }
  </script>

</body>
</html>
